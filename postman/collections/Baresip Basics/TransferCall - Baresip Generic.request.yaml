$kind: http-request
name: TransferCall -> Baresip Generic
url: "{{baseURLBaresip}}/?t{{callee}}"
method: GET
queryParams:
  t{{callee}}: ""
scripts:
  - type: afterResponse
    code: |-
      let text = pm.response.text();

      let match = text.match(/call id:([^\r\n]+)/);

      if (match) {
          let callId = match[1].trim();
          console.log("###" + callId + "###");

          pm.environment.set("callId", callId);
          return callId;
      }
    language: text/javascript
order: 2209
