$kind: http-request
name: Makecall generic
url: http://{{ws-webserver-socket}}/makecall?caller={{caller}}&callee={{callee}}&sshdest={{3pccsshdest}}
method: POST
queryParams:
  caller: "{{caller}}"
  callee: "{{callee}}"
  sshdest: "{{3pccsshdest}}"
body:
  type: formdata
  content:
    - type: text
      key: caller
      value: "{{caller}}"
    - type: text
      key: callee
      value: "{{callee}}"
order: 2000
