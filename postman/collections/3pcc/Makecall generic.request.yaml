$kind: http-request
name: Makecall generic
url: localhost:5000/makecall?caller={{caller}}&callee={{callee}}
method: POST
queryParams:
  caller: "{{caller}}"
  callee: "{{callee}}"
body:
  type: formdata
  content:
    - type: text
      key: caller
      value: "{{caller}}"
    - type: text
      key: callee
      value: "{{callee}}"
order: 2000
